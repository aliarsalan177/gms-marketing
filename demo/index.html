<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GMS Demo — Sign in</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E💪%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="../assets/styles.css" />
  <style>
    body { display: grid; place-items: center; min-height: 100vh; padding: 20px; }
    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 32px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
    }
    .login-card h1 { margin: 0 0 6px; font-size: 24px; }
    .login-card p { margin: 0 0 24px; color: var(--text-muted); font-size: 14px; }
    .login-card label {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
      margin-top: 16px;
    }
    .login-card input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
    }
    .login-card .btn {
      width: 100%;
      margin-top: 20px;
    }
    .demo-hint {
      margin-top: 20px;
      padding: 14px;
      background: var(--panel-2);
      border: 1px dashed var(--border);
      border-radius: 10px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .demo-hint code {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      padding: 2px 6px;
      background: var(--bg);
      border-radius: 4px;
    }
    .back { display: inline-block; margin-top: 16px; color: var(--text-muted); font-size: 13px; text-decoration: none; }
    .back:hover { color: var(--text); }
    .error { color: var(--danger); font-size: 13px; margin-top: 12px; }
  </style>
</head>
<body>
  <div>
    <div class="login-card">
      <h1>💪 GMS Demo</h1>
      <p>Explore the full app with mock data. Nothing is saved.</p>
      <form id="login" autocomplete="off">
        <label for="u">Username</label>
        <input id="u" name="u" required autocomplete="off" />
        <label for="p">Password</label>
        <input id="p" name="p" type="password" required autocomplete="off" />
        <div id="err" class="error" hidden></div>
        <button type="submit" class="btn btn-primary">Sign in →</button>
      </form>
      <div class="demo-hint">
        <strong>Demo credentials:</strong><br />
        Username <code>demo</code> · Password <code>demo123</code>
      </div>
    </div>
    <a href="../" class="back">← Back to home</a>
  </div>

  <script>
    // Static demo shell — no real auth. The full mock demo (with
    // mocked members, memberships, biometric scans, etc.) is under
    // construction. For now this validates the demo credentials and
    // shows a friendly "under construction" placeholder.
    const form = document.getElementById("login");
    const err = document.getElementById("err");
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const u = document.getElementById("u").value.trim();
      const p = document.getElementById("p").value.trim();
      if (u === "demo" && p === "demo123") {
        window.location.href = "./app/";
      } else {
        err.textContent = "Invalid credentials. Try demo / demo123.";
        err.hidden = false;
      }
    });
  </script>
</body>
</html>
