<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GMS Demo — Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E💪%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <!-- Demo banner -->
  <div class="demo-banner">
    <span>💡 <strong>Demo mode</strong> — mock data, nothing is saved to a real database. State lives in your browser.</span>
    <button id="btn-reset" class="link-btn">Reset demo</button>
    <a href="../../" class="link-btn">← Back to marketing site</a>
  </div>

  <div class="app-shell">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">💪 GMS</div>
      <nav>
        <a href="#/dashboard" data-route="dashboard" class="nav-item">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="#/members" data-route="members" class="nav-item">
          <span class="nav-icon">👤</span> Members
        </a>
        <a href="#/attendance" data-route="attendance" class="nav-item">
          <span class="nav-icon">🚪</span> Attendance
        </a>
        <a href="#/scanner" data-route="scanner" class="nav-item">
          <span class="nav-icon">🖐️</span> Scanner
        </a>
        <a href="#/reports" data-route="reports" class="nav-item">
          <span class="nav-icon">📈</span> Reports
        </a>
        <a href="#/settings" data-route="settings" class="nav-item">
          <span class="nav-icon">⚙️</span> Settings
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-chip">
          <div class="avatar">D</div>
          <div>
            <div class="user-name">Demo Admin</div>
            <div class="user-role">Administrator</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">
      <div id="view"></div>
    </main>
  </div>

  <!-- Toast container -->
  <div id="toasts" class="toasts"></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
